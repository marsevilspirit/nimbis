codecov:
  notify:
    wait_for_ci: true
  require_ci_to_pass: true
comment:
  behavior: default
  layout: reach,diff,components,tree
  show_carryforward_flags: false
coverage:
  precision: 2
  range:
  - 60.0
  - 80.0
  round: down
  status:
    changes: false
    default_rules:
      flag_coverage_not_uploaded_behavior: include
    patch:
      default:
        informational: true
    project:
      default:
        informational: true
component_management:
  individual_components:
  - component_id: unit
    name: unit
    paths:
    - crates/*/src/**
    statuses:
    - type: project
      informational: true
    - type: patch
      informational: true
  - component_id: integration
    name: integration
    paths:
    - crates/*/tests/**
    statuses:
    - type: project
      informational: true
    - type: patch
      informational: true
slack_app: true
