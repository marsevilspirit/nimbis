name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
no-changes-template: '- No changes'

categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement
  - title: '🐛 Bug Fixes'
    labels:
      - fix
      - bugfix
      - bug
  - title: '🧰 Maintenance'
    labels:
      - chore
      - refactor
      - ci
      - docs
      - dependencies

exclude-labels:
  - skip-changelog

template: |
  ## Changes

  $CHANGES

autolabeler:
  - label: ci
    files:
      - '.github/**'
  - label: docs
    files:
      - 'docs/**'
      - '**/*.md'
  - label: dependencies
    files:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - 'go.mod'
      - 'go.sum'
      - '**/go.mod'
      - '**/go.sum'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bugfix
      - bug
      - chore
      - refactor
      - docs
      - ci
      - dependencies
  default: patch
