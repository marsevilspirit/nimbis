name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  # Always enable colored output in Cargo (for better readability in CI logs)
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-check
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Check
      run: just check

  cargo_shear:
    name: Cargo Shear
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-cargo-shear
        cache-on-failure: true

    - name: Install cargo-shear
      uses: taiki-e/install-action@cargo-shear

    - name: Run cargo-shear
      run: cargo shear

  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-unit-test
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Install nextest
      uses: taiki-e/install-action@nextest

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run Unit Test
      run: just test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./codecov.json
        flags: rust
        name: rust-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  build_release:
    name: Build Release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-build-release-e2e
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Build Release
      run: just build --release

    - name: Upload Unix Release Binary
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: nimbis-release-${{ matrix.os }}
        path: target/release/nimbis
        if-no-files-found: error

    - name: Upload Windows Release Binary
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: nimbis-release-${{ matrix.os }}
        path: target/release/nimbis.exe
        if-no-files-found: error

  e2e_local:
    name: E2E Test (Local Filesystem)
    needs: build_release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: e2e-test/go.sum

    - name: Download Release Binary
      uses: actions/download-artifact@v4
      with:
        name: nimbis-release-${{ matrix.os }}
        path: target/release

    - name: Make Release Binary Executable
      if: runner.os != 'Windows'
      run: chmod +x target/release/nimbis

    - name: Run E2E Test
      run: just e2e-test

  e2e_minio:
    name: E2E Test (MinIO)
    needs: build_release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: e2e-test/go.sum

    - name: Download Release Binary
      uses: actions/download-artifact@v4
      with:
        name: nimbis-release-ubuntu-latest
        path: target/release

    - name: Make Release Binary Executable
      run: chmod +x target/release/nimbis

    - name: Start MinIO
      run: |
        docker run -d \
          --name nimbis-minio \
          -p 9000:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          quay.io/minio/minio server /data --address :9000
        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:9000/minio/health/ready; then
            exit 0
          fi
          sleep 1
        done
        docker logs nimbis-minio
        exit 1

    - name: Create MinIO bucket
      run: |
        docker run --rm --network host \
          -e MC_HOST_local=http://minioadmin:minioadmin@127.0.0.1:9000 \
          quay.io/minio/mc mb --ignore-existing local/nimbis

    - name: Run E2E Test Against MinIO
      env:
        NIMBIS_OBJECT_STORE_URL: s3://nimbis/nimbis-ci-${{ github.run_id }}
        NIMBIS_OBJECT_STORE_OPTION_AWS_REGION: us-east-1
        NIMBIS_OBJECT_STORE_OPTION_AWS_ENDPOINT: http://127.0.0.1:9000
        NIMBIS_OBJECT_STORE_OPTION_AWS_ACCESS_KEY_ID: minioadmin
        NIMBIS_OBJECT_STORE_OPTION_AWS_SECRET_ACCESS_KEY: minioadmin
        NIMBIS_OBJECT_STORE_OPTION_AWS_VIRTUAL_HOSTED_STYLE_REQUEST: "false"
        NIMBIS_OBJECT_STORE_OPTION_AWS_ALLOW_HTTP: "true"
      run: just e2e-test
