name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  # Always enable colored output in Cargo (for better readability in CI logs)
  CARGO_TERM_COLOR: always

jobs:
  build-cross-platform:
    name: build-cross-platform (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        # Cache key includes the OS to separate caches per platform
        shared-key: ${{ runner.os }}-rust

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Check
      run: just check

    - name: Build Release
      run: just build --release

  test-linux-full:
    name: test-linux-full
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        # Cache key includes the OS to separate caches per platform
        shared-key: ${{ runner.os }}-rust
        # Persist cache on failures for better recovery in subsequent runs.
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Install nextest
      uses: taiki-e/install-action@nextest

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: tests/go.sum

    - name: Run Unit Test
      run: just test

    - name: Run E2E Test
      run: just e2e-test

    - name: Upload coverage to Codecov
      if: github.event_name == 'push' && secrets.CODECOV_TOKEN != ''
      uses: codecov/codecov-action@v6
      with:
        files: ./codecov.json
        flags: rust
        name: rust-coverage
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
