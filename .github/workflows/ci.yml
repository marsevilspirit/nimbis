name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  # Always enable colored output in Cargo (for better readability in CI logs)
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-check
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Check
      run: just check

  cargo_shear:
    name: Cargo Shear
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-cargo-shear
        cache-on-failure: true

    - name: Install cargo-shear
      uses: taiki-e/install-action@cargo-shear

    - name: Run cargo-shear
      run: cargo shear

  unit_test:
    name: Unit Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-unit-test
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Install nextest
      uses: taiki-e/install-action@nextest

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run Unit Test
      run: just test

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      uses: codecov/codecov-action@v6
      with:
        files: ./codecov.json
        flags: rust
        name: rust-coverage
        fail_ci_if_error: true
        token: ${{ env.CODECOV_TOKEN }}

  build_release_e2e:
    name: Build Release and E2E Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-build-release-e2e
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: e2e-test/go.sum

    - name: Build Release
      run: just build --release

    - name: Run E2E Test
      run: just e2e-test
