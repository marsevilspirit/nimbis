name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  # Always enable colored output in Cargo (for better readability in CI logs)
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-check
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Check
      run: just check

    - name: Install cargo-shear
      uses: taiki-e/install-action@cargo-shear

    - name: Run cargo-shear
      run: cargo shear

  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-unit-test
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Install nextest
      uses: taiki-e/install-action@nextest

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run Unit Test
      run: just test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./codecov.json
        flags: rust
        name: rust-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  build_release:
    name: Build Release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ runner.os }}-rust-build-release-e2e
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Build Release
      run: just build --release

    - name: Upload Unix Release Binary
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: nimbis-release-${{ matrix.os }}
        path: target/release/nimbis
        if-no-files-found: error

    - name: Upload Windows Release Binary
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: nimbis-release-${{ matrix.os }}
        path: target/release/nimbis.exe
        if-no-files-found: error

  build_main_release:
    name: Build Main Release
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.base.sha }}

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ubuntu-latest-rust-build-main-release
        cache-on-failure: true

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Build Release
      run: just build --release

    - name: Upload Main Release Binary
      uses: actions/upload-artifact@v7
      with:
        name: nimbis-release-main-ubuntu-latest
        path: target/release/nimbis
        if-no-files-found: error

  e2e_local:
    name: E2E Test (Local Filesystem)
    needs: build_release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: e2e-test/go.sum

    - name: Download Release Binary
      uses: actions/download-artifact@v8
      with:
        name: nimbis-release-${{ matrix.os }}
        path: target/release

    - name: Make Release Binary Executable
      if: runner.os != 'Windows'
      run: chmod +x target/release/nimbis

    - name: Run E2E Test
      run: just e2e-test

  e2e_minio:
    name: E2E Test (MinIO)
    needs: build_release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: e2e-test/go.sum

    - name: Download Release Binary
      uses: actions/download-artifact@v8
      with:
        name: nimbis-release-ubuntu-latest
        path: target/release

    - name: Make Release Binary Executable
      run: chmod +x target/release/nimbis

    - name: Start MinIO
      run: |
        docker run -d \
          --name nimbis-minio \
          -p 9000:9000 \
          -e MINIO_ROOT_USER=minioadmin \
          -e MINIO_ROOT_PASSWORD=minioadmin \
          quay.io/minio/minio server /data --address :9000
        for i in {1..30}; do
          if curl -fsS http://127.0.0.1:9000/minio/health/ready; then
            exit 0
          fi
          sleep 1
        done
        docker logs nimbis-minio
        exit 1

    - name: Create MinIO bucket
      run: |
        docker run --rm --network host \
          -e MC_HOST_local=http://minioadmin:minioadmin@127.0.0.1:9000 \
          quay.io/minio/mc mb --ignore-existing local/nimbis

    - name: Run E2E Test Against MinIO
      env:
        NIMBIS_OBJECT_STORE_URL: s3://nimbis/nimbis-ci-${{ github.run_id }}
        NIMBIS_OBJECT_STORE_OPTION_AWS_REGION: us-east-1
        NIMBIS_OBJECT_STORE_OPTION_AWS_ENDPOINT: http://127.0.0.1:9000
        NIMBIS_OBJECT_STORE_OPTION_AWS_ACCESS_KEY_ID: minioadmin
        NIMBIS_OBJECT_STORE_OPTION_AWS_SECRET_ACCESS_KEY: minioadmin
        NIMBIS_OBJECT_STORE_OPTION_AWS_VIRTUAL_HOSTED_STYLE_REQUEST: "false"
        NIMBIS_OBJECT_STORE_OPTION_AWS_ALLOW_HTTP: "true"
      run: just e2e-test

  benchmark:
    name: Benchmark (${{ matrix.slot_title }}, ${{ matrix.data_size }} bytes)
    if: ${{ github.event_name == 'pull_request' }}
    needs: [build_release, build_main_release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slot_id: 1
            slot_title: First benchmark
            data_size: 512
          - slot_id: 2
            slot_title: Second benchmark
            data_size: 512
          - slot_id: 3
            slot_title: Third benchmark
            data_size: 512
          - slot_id: 1
            slot_title: First benchmark
            data_size: 1024
          - slot_id: 2
            slot_title: Second benchmark
            data_size: 1024
          - slot_id: 3
            slot_title: Third benchmark
            data_size: 1024

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-tools redis-server

    - uses: actions/checkout@v6

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@nightly

    - name: Cache Rust Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: benchmark-xtask
        cache-on-failure: true

    - name: Download main benchmark binary
      uses: actions/download-artifact@v8
      with:
        name: nimbis-release-main-ubuntu-latest
        path: artifacts/main/target/release

    - name: Download PR ubuntu release artifact
      uses: actions/download-artifact@v8
      with:
        name: nimbis-release-ubuntu-latest
        path: artifacts/pr/target/release

    - name: Make release binaries executable
      run: |
        chmod +x artifacts/main/target/release/nimbis
        chmod +x artifacts/pr/target/release/nimbis

    - name: Resolve latest baseline releases
      run: |
        PIKIWIDB_VERSION=$(curl -fsSL \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ github.token }}" \
          https://api.github.com/repos/OpenAtomFoundation/pikiwidb/releases/latest | python3 -c "import json, sys; print(json.load(sys.stdin)['tag_name'])")
        KVROCKS_RELEASE=$(curl -fsSL \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ github.token }}" \
          https://api.github.com/repos/apache/kvrocks/releases/latest | python3 -c "import json, sys; print(json.load(sys.stdin)['tag_name'])")
        KVROCKS_VERSION=${KVROCKS_RELEASE#v}

        echo "PIKIWIDB_VERSION=$PIKIWIDB_VERSION" >> "$GITHUB_ENV"
        echo "KVROCKS_RELEASE=$KVROCKS_RELEASE" >> "$GITHUB_ENV"
        echo "KVROCKS_VERSION=$KVROCKS_VERSION" >> "$GITHUB_ENV"

    - name: Run Redis Benchmark
      run: |
        sudo systemctl start redis-server
        sleep 5

        echo "Warmup on Redis..."
        redis-benchmark -q -t set,get -n 1000 -c 10 > /dev/null 2>&1 || true

        redis-cli FLUSHDB || true
        redis-cli HSET bench:hash field1 value1 || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 SADD bench:set:srem member:__rand_int__ > /dev/null || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 ZADD bench:zset:zrem __rand_int__ member:__rand_int__ > /dev/null || true

        echo "Running Benchmark on Redis..."
        redis-benchmark -q -t set,get,hset,lpush,lpop,sadd,zadd -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} > benchmark_redis.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} HGET bench:hash field1 >> benchmark_redis.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} SREM bench:set:srem member:__rand_int__ >> benchmark_redis.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} ZREM bench:zset:zrem member:__rand_int__ >> benchmark_redis.txt || true

        sudo systemctl stop redis-server

    - name: Run Redis Benchmark with Pipeline
      run: |
        sudo systemctl start redis-server
        sleep 5

        echo "Warmup on Redis (Pipeline)..."
        redis-benchmark -q -t set,get -n 1000 -c 10 -P 50 > /dev/null 2>&1 || true

        redis-cli FLUSHDB || true
        redis-cli HSET bench:hash field1 value1 || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 SADD bench:set:srem member:__rand_int__ > /dev/null || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 ZADD bench:zset:zrem __rand_int__ member:__rand_int__ > /dev/null || true

        echo "Running Benchmark on Redis (Pipeline)..."
        redis-benchmark -q -t set,get,hset,lpush,lpop,sadd,zadd -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 > benchmark_redis_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 HGET bench:hash field1 >> benchmark_redis_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 SREM bench:set:srem member:__rand_int__ >> benchmark_redis_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 ZREM bench:zset:zrem member:__rand_int__ >> benchmark_redis_pipeline.txt || true

        sudo systemctl stop redis-server

    - name: Run PikiwiDB Benchmark
      run: |
        trap 'docker rm -f pikiwidb-benchmark >/dev/null 2>&1 || true' EXIT
        docker run -d --rm --name pikiwidb-benchmark -p 6379:9221 pikadb/pika:${PIKIWIDB_VERSION}
        sleep 10

        echo "Warmup on PikiwiDB ${PIKIWIDB_VERSION}..."
        redis-benchmark -q -t set,get -n 1000 -c 10 > /dev/null 2>&1 || true

        redis-cli FLUSHDB || true
        redis-cli HSET bench:hash field1 value1 || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 SADD bench:set:srem member:__rand_int__ > /dev/null || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 ZADD bench:zset:zrem __rand_int__ member:__rand_int__ > /dev/null || true

        echo "Running Benchmark on PikiwiDB ${PIKIWIDB_VERSION}..."
        redis-benchmark -q -t set,get,hset,lpush,lpop,sadd,zadd -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} > benchmark_pikiwidb.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} HGET bench:hash field1 >> benchmark_pikiwidb.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} SREM bench:set:srem member:__rand_int__ >> benchmark_pikiwidb.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} ZREM bench:zset:zrem member:__rand_int__ >> benchmark_pikiwidb.txt || true

    - name: Run PikiwiDB Benchmark with Pipeline
      run: |
        trap 'docker rm -f pikiwidb-benchmark >/dev/null 2>&1 || true' EXIT
        docker run -d --rm --name pikiwidb-benchmark -p 6379:9221 pikadb/pika:${PIKIWIDB_VERSION}
        sleep 10

        echo "Warmup on PikiwiDB ${PIKIWIDB_VERSION} (Pipeline)..."
        redis-benchmark -q -t set,get -n 1000 -c 10 -P 50 > /dev/null 2>&1 || true

        redis-cli FLUSHDB || true
        redis-cli HSET bench:hash field1 value1 || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 SADD bench:set:srem member:__rand_int__ > /dev/null || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 ZADD bench:zset:zrem __rand_int__ member:__rand_int__ > /dev/null || true

        echo "Running Benchmark on PikiwiDB ${PIKIWIDB_VERSION} (Pipeline)..."
        redis-benchmark -q -t set,get,hset,lpush,lpop,sadd,zadd -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 > benchmark_pikiwidb_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 HGET bench:hash field1 >> benchmark_pikiwidb_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 SREM bench:set:srem member:__rand_int__ >> benchmark_pikiwidb_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 ZREM bench:zset:zrem member:__rand_int__ >> benchmark_pikiwidb_pipeline.txt || true

    - name: Run Kvrocks Benchmark
      run: |
        trap 'docker rm -f kvrocks-benchmark >/dev/null 2>&1 || true' EXIT
        docker run -d --rm --name kvrocks-benchmark -p 6379:6666 apache/kvrocks:${KVROCKS_VERSION} --bind 0.0.0.0
        sleep 10

        echo "Warmup on Kvrocks ${KVROCKS_RELEASE}..."
        redis-benchmark -q -t set,get -n 1000 -c 10 > /dev/null 2>&1 || true

        redis-cli FLUSHDB || true
        redis-cli HSET bench:hash field1 value1 || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 SADD bench:set:srem member:__rand_int__ > /dev/null || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 ZADD bench:zset:zrem __rand_int__ member:__rand_int__ > /dev/null || true

        echo "Running Benchmark on Kvrocks ${KVROCKS_RELEASE}..."
        redis-benchmark -q -t set,get,hset,lpush,lpop,sadd,zadd -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} > benchmark_kvrocks.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} HGET bench:hash field1 >> benchmark_kvrocks.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} SREM bench:set:srem member:__rand_int__ >> benchmark_kvrocks.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} ZREM bench:zset:zrem member:__rand_int__ >> benchmark_kvrocks.txt || true

    - name: Run Kvrocks Benchmark with Pipeline
      run: |
        trap 'docker rm -f kvrocks-benchmark >/dev/null 2>&1 || true' EXIT
        docker run -d --rm --name kvrocks-benchmark -p 6379:6666 apache/kvrocks:${KVROCKS_VERSION} --bind 0.0.0.0
        sleep 10

        echo "Warmup on Kvrocks ${KVROCKS_RELEASE} (Pipeline)..."
        redis-benchmark -q -t set,get -n 1000 -c 10 -P 50 > /dev/null 2>&1 || true

        redis-cli FLUSHDB || true
        redis-cli HSET bench:hash field1 value1 || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 SADD bench:set:srem member:__rand_int__ > /dev/null || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 ZADD bench:zset:zrem __rand_int__ member:__rand_int__ > /dev/null || true

        echo "Running Benchmark on Kvrocks ${KVROCKS_RELEASE} (Pipeline)..."
        redis-benchmark -q -t set,get,hset,lpush,lpop,sadd,zadd -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 > benchmark_kvrocks_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 HGET bench:hash field1 >> benchmark_kvrocks_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 SREM bench:set:srem member:__rand_int__ >> benchmark_kvrocks_pipeline.txt || true
        redis-benchmark -q -n 200000 -c 100 -r 100000 -d ${{ matrix.data_size }} -P 50 ZREM bench:zset:zrem member:__rand_int__ >> benchmark_kvrocks_pipeline.txt || true

    - name: Run Main benchmark
      run: |
        NIMBIS_OBJECT_STORE_URL=file:nimbis_benchmark_store/main \
          ./artifacts/main/target/release/nimbis &
        NIMBIS_PID=$!
        trap 'kill $NIMBIS_PID >/dev/null 2>&1 || true' EXIT
        echo "Nimbis (Main) started with PID $NIMBIS_PID"
        sleep 10

        echo "Running Benchmark on Main..."
        N=200000 C=100 R=100000 D=${{ matrix.data_size }} P=1 OUTPUT_DIR=benchmark_main_suites \
          cargo xtask redis-benchmark --profile comparison \
          > benchmark_main.txt

    - name: Run Main benchmark with pipeline
      run: |
        NIMBIS_OBJECT_STORE_URL=file:nimbis_benchmark_store/main-pipeline \
          ./artifacts/main/target/release/nimbis &
        NIMBIS_PID=$!
        trap 'kill $NIMBIS_PID >/dev/null 2>&1 || true' EXIT
        echo "Nimbis (Main) started with PID $NIMBIS_PID"
        sleep 10

        echo "Running Benchmark on Main (Pipeline)..."
        N=200000 C=100 R=100000 D=${{ matrix.data_size }} P=50 OUTPUT_DIR=benchmark_main_pipeline_suites \
          cargo xtask redis-benchmark --profile comparison \
          > benchmark_main_pipeline.txt

    - name: Run PR benchmark
      run: |
        NIMBIS_OBJECT_STORE_URL=file:nimbis_benchmark_store/pr \
          ./artifacts/pr/target/release/nimbis &
        NIMBIS_PID=$!
        trap 'kill $NIMBIS_PID >/dev/null 2>&1 || true' EXIT
        echo "Nimbis (PR) started with PID $NIMBIS_PID"
        sleep 10

        echo "Running Benchmark on PR..."
        N=200000 C=100 R=100000 D=${{ matrix.data_size }} P=1 OUTPUT_DIR=benchmark_pr_suites \
          cargo xtask redis-benchmark --profile comparison \
          > benchmark_pr.txt

    - name: Run PR benchmark with pipeline
      run: |
        NIMBIS_OBJECT_STORE_URL=file:nimbis_benchmark_store/pr-pipeline \
          ./artifacts/pr/target/release/nimbis &
        NIMBIS_PID=$!
        trap 'kill $NIMBIS_PID >/dev/null 2>&1 || true' EXIT
        echo "Nimbis (PR) started with PID $NIMBIS_PID"
        sleep 10

        echo "Running Benchmark on PR (Pipeline)..."
        N=200000 C=100 R=100000 D=${{ matrix.data_size }} P=50 OUTPUT_DIR=benchmark_pr_pipeline_suites \
          cargo xtask redis-benchmark --profile comparison \
          > benchmark_pr_pipeline.txt

    - name: Compare Results
      run: |
        cargo xtask compare-benchmarks \
          --main benchmark_main.txt \
          --pr benchmark_pr.txt \
          --baseline "Redis=benchmark_redis.txt" \
          --baseline "PikiwiDB ${PIKIWIDB_VERSION}=benchmark_pikiwidb.txt" \
          --baseline "Kvrocks ${KVROCKS_RELEASE}=benchmark_kvrocks.txt" \
          --main-pipeline benchmark_main_pipeline.txt \
          --pr-pipeline benchmark_pr_pipeline.txt \
          --baseline-pipeline "Redis=benchmark_redis_pipeline.txt" \
          --baseline-pipeline "PikiwiDB ${PIKIWIDB_VERSION}=benchmark_pikiwidb_pipeline.txt" \
          --baseline-pipeline "Kvrocks ${KVROCKS_RELEASE}=benchmark_kvrocks_pipeline.txt" \
          > benchmark_report.md

        cat benchmark_report.md

    - name: Comment on PR
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('benchmark_report.md', 'utf8');
          const prNumber = context.payload.pull_request.number;
          const slotId = Number.parseInt('${{ matrix.slot_id }}', 10);
          const dataSize = Number.parseInt('${{ matrix.data_size }}', 10);
          const slots = [
            { id: 1, title: 'First benchmark' },
            { id: 2, title: 'Second benchmark' },
            { id: 3, title: 'Third benchmark' },
          ];

          const slot = slots.find((entry) => entry.id === slotId);
          if (!slot) {
            throw new Error(`Unsupported benchmark slot: ${slotId}`);
          }

          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const markerFor = (slotId, size) => `<!-- benchmark-report-slot:${slotId}:${size} -->`;
          const formatBody = (slot, reportBody) => [
            markerFor(slot.id, dataSize),
            `## ${slot.title} (${dataSize} bytes)`,
            '',
            `Workflow run: ${context.runId}`,
            '',
            reportBody,
          ].join('\n');

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number: prNumber,
            per_page: 100,
          });

          const marker = markerFor(slot.id, dataSize);
          const existingComment = comments.find((item) => item.body && item.body.includes(marker));
          const body = formatBody(slot, report);

          if (existingComment) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existingComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner,
              repo,
              body,
            });
          }
