name: Performance Flamegraph

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to profile. Defaults to the workflow ref.
        required: false
        type: string
      pr_number:
        description: Optional pull request number to comment flamegraph result on
        required: false
        type: string

jobs:
  flamegraph:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref || github.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Install linux-tools for perf
          # We try generic and current kernel specific tools
          sudo apt-get install -y linux-tools-generic redis-tools git || true
          # Fallback or additional try for specific kernel version if above fails or is insufficient
          sudo apt-get install -y linux-tools-`uname -r` || true
          
          # Clone Brendan Gregg's FlameGraph repo
          git clone https://github.com/brendangregg/FlameGraph

          # Install rustfilt for symbol demangling
          cargo install rustfilt
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Nimbis
        run: |
          # Enable debug symbols in release mode for meaningful flamegraphs
          RUSTFLAGS="-g" cargo build --release
          # Build xtask before profiling so perf does not sample an idle server
          # while Cargo compiles the benchmark driver.
          cargo build -p xtask

      - name: Run Benchmark and Capture Profile
        run: |
          set -euo pipefail

          # 1. Start Nimbis in background
          NIMBIS_OBJECT_STORE_URL=file:nimbis_flamegraph_store ./target/release/nimbis &
          NIMBIS_PID=$!
          PERF_PID=""
          cleanup() {
            if [ -n "$PERF_PID" ]; then
              sudo kill -INT "$PERF_PID" >/dev/null 2>&1 || true
              wait "$PERF_PID" || true
            fi
            kill "$NIMBIS_PID" >/dev/null 2>&1 || true
            wait "$NIMBIS_PID" || true
          }
          trap cleanup EXIT

          echo "Nimbis started with PID $NIMBIS_PID"
          
          # Give it a moment to start
          sleep 5
          
          # 2. Start perf recording
          # -F 99: sample at 99Hz
          # -p $PID: profile the nimbis process
          # -g: capture call graphs
          
          echo "Starting perf record..."
          # Note: sudo is required for perf. 
          sudo perf record -F 99 -p $NIMBIS_PID -g -o perf.data &
          PERF_PID=$!
          
          # 3. Run Redis Benchmark
          echo "Running redis-benchmark comparison profile..."
          N=100000 C=100 R=100000 D=512 P=1 OUTPUT_DIR=benchmark_flamegraph \
            cargo xtask redis-benchmark --profile comparison \
            > benchmark.txt

          # 4. Stop perf
          echo "Stopping perf..."
          sudo kill -INT $PERF_PID
          # Wait for perf to write data
          wait $PERF_PID || true
          PERF_PID=""
          
          # 5. Stop Nimbis
          kill $NIMBIS_PID
          wait $NIMBIS_PID || true
          trap - EXIT
          
          # 6. Generate Flamegraph
          echo "Generating flamegraph..."
          # perf script requires reading the data file, owned by root
          # We pipe through rustfilt to demangle Rust symbols (make them readable)
          sudo perf script -i perf.data | rustfilt > out.perf
          
          # Use FlameGraph scripts
          ./FlameGraph/stackcollapse-perf.pl out.perf > out.folded
          
          # Generate SVG with consistent hashing for colors
          ./FlameGraph/flamegraph.pl --hash out.folded > flamegraph.svg
          
          echo "Flamegraph generated at flamegraph.svg"

      - name: Upload Flamegraph Artifact
        uses: actions/upload-artifact@v7
        with:
          name: flamegraph
          path: |
            flamegraph.svg
            out.folded
            benchmark.txt

      - name: Comment on PR
        if: inputs.pr_number
        uses: actions/github-script@v9
        with:
          script: |
            const run_id = context.runId;
            const repo_url = context.payload.repository.html_url;
            const rawPrNumber = (context.payload.inputs?.pr_number ?? '').trim();
            const targetRef = (context.payload.inputs?.target_ref ?? '').trim() || context.ref;
            const validPrNumberPattern = /^[1-9]\d*$/;

            if (!validPrNumberPattern.test(rawPrNumber)) {
              throw new Error(
                `Invalid pr_number input: "${rawPrNumber}". Expected a positive integer pull request number.`
              );
            }
            const prNumber = Number.parseInt(rawPrNumber, 10);
            
            const body = `### 🔥 Performance Flamegraph
            
            A flamegraph has been generated for this Pull Request.

            Target ref: \`${targetRef}\`
            
            You can download **flamegraph.svg**, **out.folded**, and **benchmark.txt** from the [Artifacts section of this Run](${repo_url}/actions/runs/${run_id}).
            
            _Note: Download the file and open it in a browser to explore the stack traces interactively._`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
